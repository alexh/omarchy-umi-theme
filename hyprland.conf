$activeBorderColor = rgb(FF6700)

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

# Cursor theme — Silver-3D from https://www.gnome-look.org/p/999543
# Install separately (see README "Requirements"); theme just selects it.
# HYPRCURSOR_THEME intentionally omitted — Silver-3D is XCursor-only,
# no hyprcursor manifest. Setting HYPRCURSOR_THEME would make Hyprland
# look for hyprcursor format, fail to find it, and fall back to default.
env = XCURSOR_THEME,Silver-3D
env = XCURSOR_SIZE,24
