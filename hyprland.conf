$activeBorderColor = rgb(FF6700)

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

# Cursor theme — Silver-3D from https://www.gnome-look.org/p/999543.
# Pre-converted hyprcursor manifest + .hlc files ship in cursors/Silver-3D/
# so Hyprland's hyprcursor backend works directly (XCursor-only otherwise).
env = XCURSOR_THEME,Silver-3D
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Silver-3D
env = HYPRCURSOR_SIZE,24
